name: ML Pipeline CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  ml-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: make install

      - name: Lint code
        run: make lint

      - name: Run tests
        run: make test

      - name: Train model with MLflow
        run: make train

      - name: Upload trained model and MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlops-model-artifacts
          path: |
            artifacts/
            mlruns/
